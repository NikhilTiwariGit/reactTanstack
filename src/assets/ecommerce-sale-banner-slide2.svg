<svg width="1200" height="400" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#34D399" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#34D399" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGradient2)"/>

  <!-- Glow accents -->
  <circle cx="1000" cy="200" r="260" fill="url(#glow)"/>
  <circle cx="150" cy="380" r="180" fill="url(#glow)" opacity="0.6"/>

  <!-- Diagonal stripes accent, right side -->
  <g stroke="#34D399" stroke-width="3" opacity="0.25">
    <line x1="950" y1="0" x2="1050" y2="400"/>
    <line x1="1000" y1="0" x2="1100" y2="400"/>
    <line x1="1050" y1="0" x2="1150" y2="400"/>
    <line x1="1100" y1="0" x2="1200" y2="400"/>
  </g>

  <!-- Gift box icon -->
  <g transform="translate(950,130)">
    <rect x="0" y="55" width="150" height="100" rx="8" fill="#34D399"/>
    <rect x="0" y="55" width="150" height="30" fill="#10B981"/>
    <rect x="65" y="0" width="20" height="155" fill="#F0FDFA"/>
    <path d="M75 55 Q40 20 20 45 Q10 60 40 60 Q60 60 75 55 Z" fill="#F0FDFA"/>
    <path d="M75 55 Q110 20 130 45 Q140 60 110 60 Q90 60 75 55 Z" fill="#F0FDFA"/>
  </g>

  <!-- Eyebrow tag -->
  <g transform="translate(90,70)">
    <rect x="0" y="0" width="170" height="36" rx="18" fill="#34D399" opacity="0.15"/>
    <circle cx="18" cy="18" r="6" fill="#34D399"/>
    <text x="34" y="24" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#34D399">
      NEW ARRIVALS
    </text>
  </g>

  <!-- Main heading -->
  <text x="90" y="200" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="#F8FAFC">
    Buy 1 Get 1
  </text>
  <text x="90" y="250" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="url(#accentGradient)">
    FREE
  </text>

  <!-- Subheading -->
  <text x="90" y="290" font-family="Arial, sans-serif" font-size="20" fill="#94A3B8">
    Selected items only — offer ends this weekend
  </text>

  <!-- CTA Button -->
  <g transform="translate(90,320)">
    <rect x="0" y="0" width="200" height="56" rx="8" fill="url(#accentGradient)"/>
    <text x="100" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold"
          fill="#0F172A" text-anchor="middle">GRAB THE DEAL</text>
  </g>

  <!-- Small print -->
  <text x="320" y="352" font-family="Arial, sans-serif" font-size="13" fill="#475569">
    *Dummy banner for demo/placeholder use
  </text>
</svg>

<svg width="1200" height="400" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="badgeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGradient)"/>

  <!-- Decorative circles -->
  <circle cx="1080" cy="60" r="120" fill="#ffffff" opacity="0.06"/>
  <circle cx="1150" cy="320" r="160" fill="#ffffff" opacity="0.06"/>
  <circle cx="60" cy="350" r="90" fill="#ffffff" opacity="0.05"/>

  <!-- Dotted pattern accent -->
  <g fill="#ffffff" opacity="0.25">
    <circle cx="950" cy="90" r="4"/>
    <circle cx="980" cy="120" r="4"/>
    <circle cx="1010" cy="90" r="4"/>
    <circle cx="950" cy="150" r="4"/>
    <circle cx="980" cy="180" r="4"/>
    <circle cx="1010" cy="150" r="4"/>
  </g>

  <!-- Shopping bag icon -->
  <g transform="translate(920,150)">
    <rect x="0" y="30" width="140" height="120" rx="12" fill="#ffffff" opacity="0.95"/>
    <path d="M25 30 L25 5 Q25 -25 70 -25 Q115 -25 115 5 L115 30" 
          stroke="#ffffff" stroke-width="10" fill="none" opacity="0.95"/>
    <circle cx="45" cy="85" r="8" fill="#7C3AED"/>
    <circle cx="95" cy="85" r="8" fill="#7C3AED"/>
    <text x="70" y="135" font-family="Arial, sans-serif" font-size="22" font-weight="bold" 
          fill="#7C3AED" text-anchor="middle">%</text>
  </g>

  <!-- Sale badge -->
  <g transform="translate(90,60)">
    <polygon points="130,0 160,20 160,60 130,80 20,80 -10,60 -10,20 20,0" fill="url(#badgeGradient)"/>
    <text x="75" y="35" font-family="Arial, sans-serif" font-size="22" font-weight="bold" 
          fill="#ffffff" text-anchor="middle">BIG SALE</text>
    <text x="75" y="62" font-family="Arial, sans-serif" font-size="14" 
          fill="#ffffff" text-anchor="middle" opacity="0.9">LIMITED TIME</text>
  </g>

  <!-- Main heading -->
  <text x="90" y="220" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#ffffff">
    UP TO 50% OFF
  </text>

  <!-- Subheading -->
  <text x="90" y="265" font-family="Arial, sans-serif" font-size="24" fill="#E0E7FF">
    On all products storewide — while stocks last
  </text>

  <!-- CTA Button -->
  <g transform="translate(90,300)">
    <rect x="0" y="0" width="220" height="60" rx="30" fill="#ffffff"/>
    <text x="110" y="38" font-family="Arial, sans-serif" font-size="20" font-weight="bold" 
          fill="#4F46E5" text-anchor="middle">SHOP NOW</text>
  </g>

  <!-- Small print -->
  <text x="340" y="335" font-family="Arial, sans-serif" font-size="14" fill="#C7D2FE">
    *Dummy banner for demo/placeholder use
  </text>
</svg>
